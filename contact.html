<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Mn designs</title>
    <link rel="stylesheet" href="stlyesheets/mn.css">
</head>
<body>
    <header class="navbar">
        <!-- Consistent Logo Wrapper -->
        <a href="index.html" class="logo-container">
            <img src="images/logo.png" alt="Mn designs Logo" class="brand-logo-img">
            <span class="logo-text">Mn designs</span>
        </a>
        <nav>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="about_us.html">About</a></li>
                <li><a href="product.html">Shop</a></li>
                <li><a href="enquiry.html">Enquiry</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main class="contact-page">
        <div class="contact-wrapper">
            <div class="contact-info">
                <h2>Get In Touch</h2>
                <p>Have a question about your order, shipping details, or returns? Drop us a line.</p>
                <div class="info-details">
                    <p><strong>Email:</strong> info@mndesigns.co.za</p>
                    <p><strong>Phone:</strong> +27 (0) 12 345 6789</p>
                    <p><strong>Studio:</strong> Pretoria, Gauteng, South Africa</p>
                </div>
                
                <!-- Styled Map Containers -->
                <div class="map-container">
                    <iframe src="https://www.google.com/maps/embed?pb=!3m2!1sen!2sza!4v1781829747230!5m2!1sen!2sza!6m8!1m7!1s4B_OJ-zvrrn4qVp3BRRasw!2m2!1d-23.90514836639029!2d29.44864916158644!3f183.39846009260646!4f3.3313605611119925!5f0.7820865974627469" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
                <div class="map-container">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d7148.147579365312!2d27.8448684!3d-26.3888036!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x1e95a95cadfc27e5%3A0x8860a1d8ddd6cbb0!2sLENASIA%20CLOTHING%20BRAND!5e0!3m2!1sen!2sza!4v1781829947800!5m2!1sen!2sza" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
                </div>
            </div> <!-- Fixed missing closing div tag here -->

            <div class="contact-form-box">
                <form id="contactForm">
                    <div class="form-group">
                        <label for="contactName">Name</label>
                        <input type="text" id="contactName" required>
                    </div>
                    <div class="form-group">
                        <label for="contactEmail">Email</label>
                        <input type="email" id="contactEmail" required>
                    </div>
                    <div class="form-group">
                        <label for="contactMessage">Message</label>
                        <textarea id="contactMessage" rows="5" required></textarea>
                    </div>
                    <button type="submit" class="btn block-btn">Send Message</button>
                </form>
                <div id="contactFeedback" class="form-feedback hidden"></div>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Mn designs. All rights reserved.</p>
    </footer>

    <!-- Cleaned script file structure pointing to javascript/mn.js -->
    <script src="javascript/mn.js"></script>
</body>
</html>
